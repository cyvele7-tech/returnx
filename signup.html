<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무료 체험 신청</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(180deg,#0b0f1a,#111827);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  background:#111827;
  padding:40px;
  border-radius:15px;
  width:350px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
}

h1 {
  margin-bottom:20px;
}

input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
}

input::placeholder {
  color:#aaa;
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  background:#4f7cff;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  background:#355fe0;
}

.sub {
  font-size:12px;
  opacity:0.6;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="container">
  <h1>무료 체험 신청</h1>

  <input type="text" placeholder="이름">
  <input type="email" placeholder="이메일">

  <button onclick="location.href='pay.html'">지금 시작하기</button>

  <div class="sub">✔ 입력 후 바로 이용 가능합니다</div>
</div>

</body>
</html>
